<svg xmlns="http://www.w3.org/2000/svg" width="480" height="90" viewBox="0 0 480 90">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fceabb"/>
      <stop offset="40%" style="stop-color:#fccd4d"/>
      <stop offset="50%" style="stop-color:#f8b500"/>
      <stop offset="60%" style="stop-color:#fccd4d"/>
      <stop offset="100%" style="stop-color:#fbdf93"/>
    </linearGradient>
    <!-- 텍스트 글로우 효과 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 배경 없음 (투명) -->
  <!-- 메인 텍스트: 축하합니다! 한 줄로 중앙 정렬 -->
  <text
    x="240"
    y="62"
    text-anchor="middle"
    font-family="'Outfit', 'Noto Sans KR', sans-serif"
    font-size="48"
    font-weight="900"
    fill="url(#goldGrad)"
    filter="url(#glow)"
    letter-spacing="2"
  >✨ 축하합니다! ✨</text>
</svg>
